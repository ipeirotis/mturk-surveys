name: Deploy to Google App Engine

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -B

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: mturk-demographics

      - name: Deploy to App Engine
        run: mvn appengine:deploy -B -Dapp.deploy.promote=true

      - name: Deploy cron jobs
        run: gcloud app deploy src/main/appengine/cron.yaml --project=mturk-demographics --quiet

      - name: Deploy Datastore indexes
        run: gcloud app deploy src/main/appengine/index.yaml --project=mturk-demographics --quiet
