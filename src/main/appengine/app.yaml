runtime: java21

instance_class: F2

automatic_scaling:
  max_instances: 2

env_variables:
  AWS_REGION: "us-east-1"
  QUEUE_ID: "default"
  LOCATION_ID: "us-central1"

liveness_check:
  path: "/actuator/health"
  check_interval_sec: 30
  timeout_sec: 4
  failure_threshold: 3
  success_threshold: 2

handlers:
  - url: /.*
    secure: always
    script: auto
