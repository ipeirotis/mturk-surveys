cron:
- url: '/tasks/createHIT?surveyId=demographics&production=true'
  schedule: 'every 15 minutes'
  description: 'Create Demographics HIT'
- url: '/tasks/deleteHITs'
  schedule: 'every day 03:00'
  description: 'Delete HITs'
- url: '/tasks/snapshotDemographics'
  schedule: 'every day 04:00'
  description: 'Snapshot yesterday demographics data and rebuild affected rollups'
- url: '/tasks/warmChartCache'
  schedule: 'every day 04:15'
  description: 'Pre-warm chart data cache for full date range'
- url: '/tasks/exportToBigQuery'
  schedule: 'every day 05:00'
  description: 'Export yesterday demographics to BigQuery'
- url: '/tasks/backupDatastore'
  schedule: 'every sunday 06:00'
  description: 'Weekly full Datastore backup to GCS'
- url: '/tasks/dedupDatastoreGlobal'
  schedule: 'every sunday 07:00'
  description: 'Weekly global deduplication of UserAnswer entities'
